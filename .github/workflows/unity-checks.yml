name: Unity Package Checks

on:
  pull_request:
    paths:
      - 'unity/AssetLockBoard/**'
  push:
    branches: [main]
    paths:
      - 'unity/AssetLockBoard/**'

jobs:
  meta-files:
    name: Validate .meta files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for missing .meta files
        working-directory: unity/AssetLockBoard
        run: |
          EXIT=0
          for f in $(find Editor -type f \
            ! -name '*.meta' \
            ! -name '.gitkeep' \
            ! -name '.DS_Store' \
            2>/dev/null); do
            if [ ! -f "${f}.meta" ]; then
              echo "::error::Missing .meta file for: ${f}"
              EXIT=1
            fi
          done
          for m in $(find Editor -name '*.meta' 2>/dev/null); do
            target="${m%.meta}"
            if [ ! -e "$target" ]; then
              echo "::warning::Orphaned .meta file (no matching file/dir): ${m}"
            fi
          done
          for d in $(find Editor -type d ! -path '.' 2>/dev/null); do
            if [ ! -f "${d}.meta" ]; then
              echo "::error::Missing .meta file for directory: ${d}"
              EXIT=1
            fi
          done
          if [ $EXIT -eq 0 ]; then
            echo "✓ All .meta files present"
          fi
          exit $EXIT

  package-json:
    name: Validate package.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check package.json is valid JSON
        run: python3 -c "import json; json.load(open('unity/AssetLockBoard/package.json'))"

      - name: Check version format (semver)
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('unity/AssetLockBoard/package.json'))['version'])")
          if echo "$VERSION" | grep -qP '^\d+\.\d+\.\d+$'; then
            echo "✓ Version: $VERSION"
          else
            echo "::error::Invalid version format: $VERSION (expected semver X.Y.Z)"
            exit 1
          fi

  firebase-url-check:
    name: Check no secrets in code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for hardcoded tokens
        run: |
          EXIT=0
          if grep -rn "BOT_TOKEN\|AAHN6ras\|github_pat_" unity/AssetLockBoard/Editor/ 2>/dev/null; then
            echo "::error::Found hardcoded tokens in Editor scripts"
            EXIT=1
          fi
          if [ $EXIT -eq 0 ]; then
            echo "✓ No hardcoded secrets found"
          fi
          exit $EXIT
